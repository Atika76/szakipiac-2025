name: Deploy SzakiPiac import function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/send-quote-to-epitesnaplo/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-szakipiac-import-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-quote-to-epitesnaplo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-quote-to-epitesnaplo --project-ref bxtpnotswnwrbycvfypz
