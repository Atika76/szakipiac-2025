name: Deploy SzakiPiac import function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/send-quote-to-epitesnaplo/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-szakipiac-import-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare Supabase temp folder
        run: |
          echo "Repo tartalom ellenőrzése:"
          ls -la
          echo "Supabase mappa ellenőrzése:"
          ls -la supabase || true

          if [ ! -d "supabase" ]; then
            echo "HIBA: nincs supabase mappa a repo főkönyvtárában."
            exit 1
          fi

          rm -rf supabase/.temp
          mkdir -p supabase/.temp

      - name: Deploy send-quote-to-epitesnaplo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-quote-to-epitesnaplo --project-ref bxtpnotswnwrbycvfypz --debug
