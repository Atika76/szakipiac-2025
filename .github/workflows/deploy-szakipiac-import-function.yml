name: Deploy SzakiPiac import function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/send-quote-to-epitesnaplo/**'
      - 'supabase/functions/generate-ad/**'
      - 'supabase/functions/manage-ad-cleanup/**'
      - 'supabase/functions/paypal-order/**'
      - 'supabase/authenticated_features.sql'
      - 'supabase/price_catalog.sql'
      - 'supabase/admin_analytics.sql'
      - 'supabase/szakipiac_360.sql'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-szakipiac-import-function.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare Supabase temp folder
        run: |
          rm -rf supabase/.temp
          mkdir -p supabase/.temp

      - name: Deploy send-quote-to-epitesnaplo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-quote-to-epitesnaplo --project-ref bxtpnotswnwrbycvfypz --debug

      - name: Deploy authenticated Gemini ad writer
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy generate-ad --project-ref bxtpnotswnwrbycvfypz --debug

      - name: Deploy authenticated ad and image cleanup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy manage-ad-cleanup --project-ref bxtpnotswnwrbycvfypz --debug

      - name: Deploy server-verified PayPal order function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy paypal-order --project-ref bxtpnotswnwrbycvfypz --debug

      - name: Apply authenticated-only database policies
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref bxtpnotswnwrbycvfypz
          supabase db query --linked --file supabase/authenticated_features.sql
          supabase db query --linked --file supabase/price_catalog.sql
          supabase db query --linked --file supabase/admin_analytics.sql
          supabase db query --linked --file supabase/szakipiac_360.sql
