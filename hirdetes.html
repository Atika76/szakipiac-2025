<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SzakiPiac hirdetés</title>
  <meta name="description" content="Konkrét SzakiPiac hirdetés megtekintése." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SzakiPiac" />
  <meta property="og:title" content="SzakiPiac hirdetés" />
  <meta property="og:description" content="Nyisd meg a hirdetést a SzakiPiacon, és kérj ajánlatot közvetlenül." />
  <meta property="og:url" content="https://szakipiac-2025.hu/hirdetes.html" />
  <meta property="og:image" content="https://szakipiac-2025.hu/og-facebook.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SzakiPiac hirdetés" />
  <meta name="twitter:description" content="Nyisd meg a hirdetést a SzakiPiacon, és kérj ajánlatot közvetlenül." />
  <meta name="twitter:image" content="https://szakipiac-2025.hu/og-facebook.jpg" />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-3 min-w-0">
        <img src="szakipiac-logo-promo.png" alt="SzakiPiac" class="h-10 w-auto">
        <div>
          <div class="font-black text-slate-900">SzakiPiac</div>
          <div class="text-xs text-slate-500">Konkrét hirdetésoldal megosztáshoz</div>
        </div>
      </a>
      <div class="flex gap-2 flex-wrap justify-end">
        <a href="index.html" class="px-3 py-2 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200">← Főoldal</a>
        <a id="fbTopShare" href="#" target="_blank" rel="noopener" class="px-3 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">Facebook megosztás</a>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <div id="state" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center text-slate-500">Hirdetés betöltése...</div>
    <article id="adCard" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"></article>
  </main>

  <script>
    const SUPABASE_URL = "https://bxtpnotswnwrbycvfypz.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "<SECRET>";
    const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const qs = new URLSearchParams(window.location.search);
    const adId = qs.get('id');
    const stateEl = document.getElementById('state');
    const adCard = document.getElementById('adCard');
    const fbTopShare = document.getElementById('fbTopShare');

    function esc(v){
      return String(v || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function updateShare(ad){
      const shareUrl = `${window.location.origin}/hirdetes.html?id=${encodeURIComponent(ad.id || '')}`;
      const quoteParts = [ad.cim || 'SzakiPiac hirdetés', ad.kategoria || '', ad.varos || 'Országos', ad.ar ? `${parseInt(ad.ar).toLocaleString('hu-HU')} Ft` : ''].filter(Boolean);
      const quote = `${quoteParts.join(' • ')}
Megnézem a SzakiPiacon:`;
      fbTopShare.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}&quote=${encodeURIComponent(quote)}`;
    }

    function render(ad){
      document.title = `${ad.cim || 'SzakiPiac hirdetés'} – SzakiPiac`;
      updateShare(ad);
      const imgHtml = Array.isArray(ad.kep_url_tomb) && ad.kep_url_tomb.length
        ? `<div class="grid sm:grid-cols-2 gap-3">${ad.kep_url_tomb.map(url => `<img src="${esc(url)}" class="w-full h-64 object-cover rounded-xl border border-slate-200" alt="Hirdetés kép">`).join('')}</div>`
        : '';
      const emailBtn = ad.email ? `<a href="mailto:${esc(ad.email)}" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700">📧 Email</a>` : '';
      const phoneBtn = ad.telefonszam ? `<a href="tel:${esc(ad.telefonszam)}" class="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200">📞 Hívás</a>` : '';
      const webBtn = ad.weboldal ? `<a href="${esc(ad.weboldal)}" target="_blank" rel="noopener" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">🌐 Weboldal</a>` : '';
      const profileBtn = ad.user_id ? `<a href="szakember.html?uid=${encodeURIComponent(ad.user_id)}" class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">👤 Profil</a>` : '';
      const msgBtn = ad.user_id ? `<a href="uzenetek.html?uid=${encodeURIComponent(ad.user_id)}" class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">💬 Üzenet</a>` : '';
      const offerBtn = ad.user_id ? `<a href="uzenetek.html?uid=${encodeURIComponent(ad.user_id)}&prefill=${encodeURIComponent(`Szia! A(z) "${ad.cim || 'hirdetés'}" kapcsán szeretnék ajánlatot kérni.`)}" class="px-4 py-2 rounded-lg bg-amber-500 text-white hover:bg-amber-600">📝 Ajánlatkérés</a>` : '';
      adCard.innerHTML = `
        <div class="p-6 md:p-8">
          <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
              <div class="text-xs font-black uppercase tracking-wide text-green-700">${esc(ad.kategoria || 'Hirdetés')} ${ad.varos ? `• ${esc(ad.varos)}` : ''}</div>
              <h1 class="mt-2 text-3xl font-black text-slate-900">${esc(ad.cim || 'SzakiPiac hirdetés')}</h1>
              <div class="mt-3 flex flex-wrap gap-2 text-sm text-slate-600">
                <span class="px-3 py-1 rounded-full bg-slate-100">${esc(ad.varos || 'Országos')}</span>
                ${ad.csomag ? `<span class="px-3 py-1 rounded-full bg-amber-100 text-amber-800">${esc(ad.csomag)}</span>` : ''}
                ${ad.ar ? `<span class="px-3 py-1 rounded-full bg-green-100 text-green-800 font-bold">${parseInt(ad.ar).toLocaleString('hu-HU')} Ft</span>` : ''}
              </div>
            </div>
            <a href="#" onclick="document.getElementById('fbTopShare').click(); return false;" class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">f Facebook megosztás</a>
          </div>

          <div class="mt-6 text-base leading-7 text-slate-700 whitespace-pre-line">${esc(ad.leiras || '')}</div>

          ${imgHtml ? `<div class="mt-6">${imgHtml}</div>` : ''}

          <div class="mt-8 flex flex-wrap gap-3">${emailBtn}${phoneBtn}${webBtn}${profileBtn}${msgBtn}${offerBtn}</div>
        </div>`;
      stateEl.classList.add('hidden');
      adCard.classList.remove('hidden');
    }

    async function boot(){
      if (!adId) {
        stateEl.innerHTML = '<div class="text-red-600 font-semibold">Hiányzik a hirdetés azonosítója.</div><div class="mt-3"><a href="index.html" class="text-blue-700 underline">Vissza a főoldalra</a></div>';
        return;
      }
      try {
        const { data, error } = await supaClient.from('hirdetesek').select('*').eq('id', adId).maybeSingle();
        if (error) throw error;
        if (!data) {
          stateEl.innerHTML = '<div class="text-red-600 font-semibold">Ez a hirdetés már nem érhető el.</div><div class="mt-3"><a href="index.html" class="text-blue-700 underline">Vissza a főoldalra</a></div>';
          return;
        }
        render(data);
      } catch (e) {
        console.error(e);
        stateEl.innerHTML = '<div class="text-red-600 font-semibold">Nem sikerült betölteni a hirdetést.</div><div class="mt-3"><button onclick="location.reload()" class="px-4 py-2 rounded-lg bg-slate-900 text-white">Újrapróbálom</button></div>';
      }
    }
    boot();
  </script>
</body>
</html>
