    function getYouTubeEmbedUrl(url) {
      if (!url) return null;
      try {
        const urlObj = new URL(url);
        let videoId;
        if (urlObj.hostname === "youtu.be") videoId = urlObj.pathname.slice(1);
        else if (urlObj.hostname.includes("youtube.com") && urlObj.searchParams.has("v")) videoId = urlObj.searchParams.get("v");
        return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
      } catch (e) { return null; }
    }

    async function fillRatingsForCards(list){
      try{
        const uids = Array.from(new Set((list || []).map(x => x.user_id).filter(Boolean)));
        if (!uids.length) return;

        // Lekérjük a csillagokat (max 5000 rekord) és átlagot számolunk kliensen
        const { data, error } = await supaClient
          .from("szakember_ratings")
          .select("user_id,stars")
          .in("user_id", uids)
          .limit(5000);

        if (error) throw error;

        const sums = {};
        const counts = {};
        (data || []).forEach(r => {
          const uid = r.user_id;
          const s = Number(r.stars || 0);
          if (!uid || !s) return;
          sums[uid] = (sums[uid] || 0) + s;
          counts[uid] = (counts[uid] || 0) + 1;
        });

        // Frissítjük a DOM-ot
        uids.forEach(uid => {
          const elList = document.querySelectorAll(`[data-rating-for="${uid}"]`);
          if (!elList || !elList.length) return;

          const c = counts[uid] || 0;
          const avg = c ? (sums[uid] / c) : 0;
          const txt = c ? `⭐ ${avg.toFixed(1)} (${c})` : `⭐ –`;
          elList.forEach(el => el.textContent = txt);
        });
      }catch(e){
        // ha nincs tábla/policy, nem állítjuk le az oldalt
        console.warn("fillRatingsForCards hiba", e);
      }
    }

      if (!cim) return showToast("Adj meg címet!", "error");

        for (const file of kivalasztottKepek) {

          const safeName = `${Date.now()}_${Math.floor(Math.random() * 100000)}.${ext}`;

          const { error: upErr } = await supaClient.storage.from('hirdetes-kepek').upload(path, file);

          const { data } = supaClient.storage.from('hirdetes-kepek').getPublicUrl(path);
          imgUrls.push(data.publicUrl);
        }

        const days = csomag === 'extra' ? 30 : (csomag === 'premium' ? 14 : 7);
        const lejarat = new Date();
        lejarat.setDate(lejarat.getDate() + days);

        const { data: inserted, error } = await supaClient
          .from('hirdetesek')
          .insert({
            user_id: session.user.id,
            email: session.user.email,
            cim: cim,
            leiras: document.getElementById("leiras").value,
            varos: document.getElementById("varos").value,
            iranyitoszam: document.getElementById("iranyitoszam").value,
            kategoria: document.getElementById("kategoria").value,
            telefonszam: document.getElementById("telefonszam").value,
            weboldal: document.getElementById("weboldal").value,
            video_url: document.getElementById("video").value,
            ar: document.getElementById("ar").value || null,
            csomag: csomag,
            kep_url_tomb: imgUrls,
            lejárati_datum: lejarat.toISOString()
          })
          .select('id, cim, varos, csomag, email')
          .single();

        if (error) throw error;

        // ✅ Admin e-mail értesítés (Edge Function) – ha nem megy, a hirdetés akkor is feladva marad
        try{
          await supaClient.functions.invoke("notify-new-ad", {
            body: {
              adId: inserted?.id ?? null,
              title: inserted?.cim ?? cim,
              city: inserted?.varos ?? document.getElementById("varos").value,
              csomag: inserted?.csomag ?? csomag,
              email: inserted?.email ?? session.user.email
            }
          });
        }catch(e){
          console.warn("notify-new-ad hiba:", e);
        }


        // ✅ feltöltés event
        trackEvent("ad_created", { csomag, images: imgUrls.length });

        showToast("Sikeres feltöltés!", "success");
        window.location.hash = "#home";
      } catch (e) {
        console.error(e);
        showToast("Hiba: " + (e.message || e), "error");
      }
    }

    /* =========================
       8) AUTH & ADMIN
    ========================= */
    async function showAuthPage() {
      const c = document.getElementById("auth-page");
      c.innerHTML = `<div class="bg-white p-8 rounded shadow-sm max-w-md mx-auto text-center">
        <h2 class="text-2xl font-bold mb-4">Bejelentkezés</h2>
        <form id="login-form" class="space-y-4">
          <input type="email" name="email" placeholder="Email" class="w-full border p-2 rounded" required>
          <input type="password" name="password" placeholder="Jelszó" class="w-full border p-2 rounded" required>
          <button class="w-full bg-green-600 text-white p-2 rounded">Mehet</button>
        </form>
      </div>`;

      document.getElementById("login-form").addEventListener("submit", async e => {
        e.preventDefault();
        const email = e.target.email.value;
        const password = e.target.password.value;

        const { error } = await supaClient.auth.signInWithPassword({ email, password });
        if (error) {
          const { error: upErr } = await supaClient.auth.signUp({ email, password });
          if (upErr) showToast(upErr.message, "error");
          else showToast("Regisztráció sikeres! Lépj be.", "success");
        } else {
          showToast("Sikeres belépés!", "success");
          window.location.hash = "#home";
          window.location.reload();
        }
        setTimeout(() => fillRatingsForCards(list), 0);
      });
    }

    async function showAdminPage() {
      const { data: { session } } = await supaClient.auth.getSession();
      if (!session || session.user.email !== ADMIN_EMAIL) {
        document.getElementById("admin-page").innerHTML = "<p class='text-center text-red-500'>Nincs jogod.</p>";
        return;
      }

      // ✅ 1) Látogatói statisztika (RPC) - FIX: tömbből az első sor + helyes mezőnevek
      let stats = null;
      try {
        const { data: statsData, error: statsErr } = await supaClient.rpc("get_visitor_stats");
        if (statsErr) throw statsErr;
        stats = (statsData && statsData[0]) ? statsData[0] : null;   // ✅ EZ HIÁNYZOTT
      } catch (e) {
        console.warn("Visitor stats error:", e?.message || e);
      }

      // ✅ 2) Hirdetések
      const { data, error } = await supaClient.from("hirdetesek").select("*").order("created_at", { ascending: false });
      if (error) {
        document.getElementById("admin-page").innerHTML = `<p class='text-center text-red-500'>Hiba: ${error.message}</p>`;
        return;
      }

      const statsHtml = stats ? `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
            <div class="text-sm text-gray-500">Összes oldalmegtekintés</div>
            <div class="text-2xl font-bold text-gray-900">${(stats.total_pageviews ?? 0).toLocaleString("hu-HU")}</div>
          </div>
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
            <div class="text-sm text-gray-500">Egyedi látogatók (visitor_id)</div>
            <div class="text-2xl font-bold text-gray-900">${(stats.unique_visitors ?? 0).toLocaleString("hu-HU")}</div>
          </div>
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
            <div class="text-sm text-gray-500">Mai oldalmegtekintés</div>
            <div class="text-2xl font-bold text-gray-900">${(stats.today_pageviews ?? 0).toLocaleString("hu-HU")}</div>
          </div>
        </div>
      ` : `
        <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded mb-6">
          <b>Statisztika nem elérhető.</b><br>
          (Ha most raktad fel: oké — menni fog, amint vannak új "page_view" események visitor_id-vel.)
        </div>
      `;

      document.getElementById("admin-page").innerHTML = `
        <div class="bg-white p-6 rounded shadow">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold">Admin Panel</h2>
            <div class="text-sm text-gray-500">Bejelentkezve: <b>${session.user.email}</b></div>
          </div>

          ${statsHtml}

          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-100 text-left">
                  <th class="p-2">Cím</th>
                  <th class="p-2">Email</th>
                  <th class="p-2">Lejárat</th>
                  <th class="p-2">Művelet</th>
                </tr>
              </thead>
              <tbody>
                ${(data || []).map(h => `
                  <tr class="border-b">
                    <td class="p-2 font-bold">${h.cim}</td>
                    <td class="p-2 text-gray-600">${h.email}</td>
                    <td class="p-2 text-blue-600">${new Date(h.lejárati_datum).toLocaleDateString('hu-HU')}</td>
                    <td class="p-2">
                      <button onclick="window.deleteAd('${h.id}')" class="text-red-600 font-bold hover:underline">Törlés</button>
                    </td>
                  </tr>`).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    window.deleteAd = async (id) => {
      if (!confirm("Biztos?")) return;
      const { error } = await supaClient.from("hirdetesek").delete().eq("id", id);
      if (error) return showToast("Hiba: " + error.message, "error");

      trackEvent("ad_deleted", { id });
      showAdminPage();
      showToast("Törölve", "success");
    };

    /* =========================
       9) INDÍTÁS
    ========================= */
    async function init() {
      // Lejárt hirdetések törlése
      try {
        const now = new Date().toISOString();
        await supaClient.from('hirdetesek').delete().lt('lejárati_datum', now);
      } catch (e) {
        console.error("Hiba az automatikus törlésnél:", e);
      }

      const { data: { session } } = await supaClient.auth.getSession();
      const navAuth = document.getElementById("nav-auth-section");
      const mobileNavAuth = document.getElementById("mobile-nav-auth-section");

      const adminLink = (session && session.user.email === ADMIN_EMAIL)
        ? '<a href="#admin" class="text-yellow-600 font-bold text-sm ml-2">ADMIN</a>'
        : '';

      const inboxLink = session
        ? `<a href="uzenetek.html" class="text-sm font-bold text-emerald-700 hover:underline">Üzeneteim</a>`
        : "";

      const profileLink = session
        ? `<a href="profilom.html" class="text-sm font-bold text-indigo-700 hover:underline">Profilom</a>`
        : "";

      const authHTML = session
        ? `<div class="flex items-center gap-3 justify-center">
             <span class="text-sm font-bold truncate max-w-[180px]">${session.user.email}</span>
             ${inboxLink}
             ${profileLink}
             ${adminLink}
             <button onclick="window.doLogout()" class="text-sm text-red-600 hover:underline ml-2">Kilépés</button>
           </div>`
        : `<a href="#auth" class="text-green-600 font-bold hover:underline">Belépés</a>`;

      navAuth.innerHTML = authHTML;
      if (mobileNavAuth) mobileNavAuth.innerHTML = authHTML;

      window.doLogout = async () => { await supaClient.auth.signOut(); window.location.reload(); };

      window.addEventListener("hashchange", handleRouteChange);
      document.querySelectorAll(".nav-link, .nav-link-logo").forEach(l => {
        l.addEventListener("click", e => {
          if (l.getAttribute('href') === 'kalkulator.html') return;
          e.preventDefault();
          window.location.hash = new URL(l.href).hash;
        });
      });

      document.getElementById("mobile-menu-button").addEventListener("click", () => {
        document.getElementById("mobile-menu").classList.toggle("hidden");
      });

      document.getElementById("btn-next").addEventListener("click", nextReklam);
      document.getElementById("btn-prev").addEventListener("click", prevReklam);

      document.getElementById("lightbox-close").addEventListener("click", () => document.getElementById("lightbox").classList.add("hidden"));

      // első route + reklám
      handleRouteChange();
      renderReklam();
      resetReklamTimer();

      // ✅ első pageview
      trackEvent("page_view", {
        page: window.location.hash || "#home",
        path: window.location.pathname,
        user_agent: navigator.userAgent
        setTimeout(() => fillRatingsForCards(list), 0);
      });
    }

    window.openLightbox = (u) => {
      document.getElementById("lightbox-img").src = u;
      document.getElementById("lightbox").classList.remove("hidden");
    };

    init();
  </script>
</body>
</html>
