services:
  szakilead:
    build: .
    restart: unless-stopped
    ports:
      - "4174:4174"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4174
      SEED_DEMO: "false"
    volumes:
      - szakilead-data:/app/data

volumes:
  szakilead-data:
