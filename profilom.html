<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilom – SzakiPiac</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f8fafc}</style>
</head>
<body class="text-slate-900">
  <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3 font-bold text-lg">
        <img src="szakipiac-logo-promo.png" class="h-10" alt="SzakiPiac" />
        <span>Profilom</span>
      </a>
      <div class="flex items-center gap-2">
        <a href="uzenetek.html" class="px-3 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50">Üzeneteim</a>
        <a id="publicProfileBtn" href="#" class="px-3 py-2 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700">Nyilvános profil</a>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <div id="alert" class="hidden mb-6 rounded-2xl border p-4"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <section class="lg:col-span-2 bg-white border border-slate-200 rounded-3xl shadow-sm p-6">
        <div class="flex items-start gap-4 mb-6">
          <div class="h-20 w-20 rounded-2xl bg-slate-100 overflow-hidden flex items-center justify-center">
            <img id="avatarPreview" class="hidden h-full w-full object-cover" alt="Avatar" />
            <span id="avatarFallback" class="text-3xl">👤</span>
          </div>
          <div>
            <h1 class="text-2xl font-bold">Saját szakember profil</h1>
            <p class="text-slate-600 mt-1">Itt tudod módosítani a profilod adatait. Ezek jelennek meg a nyilvános szakember oldalon is.</p>
          </div>
        </div>

        <form id="profileForm" class="space-y-4">
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold mb-1">Megjelenő név</label>
              <input id="displayName" class="w-full rounded-xl border border-slate-200 p-3" placeholder="pl. Bartha Attila" />
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Város</label>
              <input id="city" class="w-full rounded-xl border border-slate-200 p-3" placeholder="pl. Esztergom" />
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold mb-1">Telefon</label>
              <input id="phone" class="w-full rounded-xl border border-slate-200 p-3" placeholder="+36..." />
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Weboldal</label>
              <input id="website" class="w-full rounded-xl border border-slate-200 p-3" placeholder="https://..." />
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold mb-1">Avatar URL</label>
            <input id="avatarUrl" class="w-full rounded-xl border border-slate-200 p-3" placeholder="https://..." />
          </div>

          <div>
            <label class="block text-sm font-semibold mb-1">Bemutatkozás</label>
            <textarea id="bio" rows="6" class="w-full rounded-xl border border-slate-200 p-3" placeholder="Mutasd be röviden a munkádat, tapasztalatodat, miben vagy erős."></textarea>
          </div>

          <div class="flex flex-wrap items-center gap-3">
            <button id="saveProfileBtn" class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-slate-900 text-white hover:bg-slate-800 font-semibold transition disabled:opacity-70 disabled:cursor-not-allowed">
              <span id="saveSpinner" class="hidden h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin"></span>
              <span id="saveBtnText">Mentés</span>
            </button>
            <button type="button" id="btnReload" class="px-5 py-3 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 font-semibold">Újratöltés</button>
            <span id="saveFeedback" class="hidden text-sm font-semibold px-3 py-2 rounded-xl"></span>
          </div>
        </form>
      </section>

      <aside class="space-y-6">
        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-6">
          <h2 class="text-lg font-bold">Állapot</h2>
          <div id="statusBox" class="mt-3 text-sm text-slate-600">Betöltés…</div>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-6">
          <h2 class="text-lg font-bold">Gyors linkek</h2>
          <div class="mt-3 space-y-2 text-sm">
            <a href="index.html#feltoltes" class="block text-emerald-700 hover:underline">Új hirdetés feladása</a>
            <a href="uzenetek.html" class="block text-emerald-700 hover:underline">Beérkező üzenetek</a>
            <a id="publicProfileLink" href="#" class="block text-emerald-700 hover:underline">Nyilvános szakember profil</a>
          </div>
        </div>
      </aside>
    </div>
  </main>

<script type="module">
  const SUPABASE_URL = "https://bxtpnotswnwrbycvfypz.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Mb8TFdTfXZqemImigup9Ig_RpJhUrx8";
  const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const $ = (id) => document.getElementById(id);
  let feedbackTimer = null;

  function showAlert(msg, type = "info"){
    const el = $("alert");
    el.className = "mb-6 rounded-2xl border p-4";
    if (type === "error") el.classList.add("bg-red-50","border-red-200","text-red-800");
    else if (type === "ok") el.classList.add("bg-emerald-50","border-emerald-200","text-emerald-800");
    else el.classList.add("bg-blue-50","border-blue-200","text-blue-800");
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function setSaveState(state, msg = ""){
    const btn = $("saveProfileBtn");
    const spinner = $("saveSpinner");
    const btnText = $("saveBtnText");
    const feedback = $("saveFeedback");

    if (feedbackTimer) {
      clearTimeout(feedbackTimer);
      feedbackTimer = null;
    }

    btn.classList.remove("bg-slate-900","hover:bg-slate-800","bg-emerald-600","hover:bg-emerald-700","bg-red-600","hover:bg-red-700");
    feedback.className = "text-sm font-semibold px-3 py-2 rounded-xl";

    if (state === "saving"){
      btn.disabled = true;
      spinner.classList.remove("hidden");
      btnText.textContent = "Mentés...";
      btn.classList.add("bg-slate-900","hover:bg-slate-800");
      feedback.textContent = "Mentés folyamatban...";
      feedback.classList.add("bg-slate-100","text-slate-700");
      feedback.classList.remove("hidden");
      return;
    }

    btn.disabled = false;
    spinner.classList.add("hidden");

    if (state === "success"){
      btnText.textContent = "Mentve";
      btn.classList.add("bg-emerald-600","hover:bg-emerald-700");
      feedback.textContent = msg || "✅ Sikeresen mentve";
      feedback.classList.add("bg-emerald-50","text-emerald-700","border","border-emerald-200");
      feedback.classList.remove("hidden");
      feedbackTimer = setTimeout(() => {
        btnText.textContent = "Mentés";
        btn.classList.remove("bg-emerald-600","hover:bg-emerald-700");
        btn.classList.add("bg-slate-900","hover:bg-slate-800");
        feedback.classList.add("hidden");
      }, 2800);
      return;
    }

    if (state === "error"){
      btnText.textContent = "Mentés";
      btn.classList.add("bg-red-600","hover:bg-red-700");
      feedback.textContent = msg || "❌ Hiba történt";
      feedback.classList.add("bg-red-50","text-red-700","border","border-red-200");
      feedback.classList.remove("hidden");
      feedbackTimer = setTimeout(() => {
        btn.classList.remove("bg-red-600","hover:bg-red-700");
        btn.classList.add("bg-slate-900","hover:bg-slate-800");
      }, 2800);
      return;
    }

    btnText.textContent = "Mentés";
    btn.classList.add("bg-slate-900","hover:bg-slate-800");
    feedback.classList.add("hidden");
  }

  function safeUrl(u){
    const s = (u || "").trim();
    if (!s) return "";
    try { return new URL(s).href; } catch { return ""; }
  }

  function setAvatar(url){
    const img = $("avatarPreview");
    const fallback = $("avatarFallback");
    const safe = safeUrl(url);
    if (safe){
      img.src = safe;
      img.classList.remove("hidden");
      fallback.classList.add("hidden");
    } else {
      img.src = "";
      img.classList.add("hidden");
      fallback.classList.remove("hidden");
    }
  }

  async function loadProfile(){
    const { data: { session } } = await supaClient.auth.getSession();
    if (!session?.user){
      location.href = "index.html#auth";
      return;
    }

    const uid = session.user.id;
    const publicUrl = `szakember.html?uid=${encodeURIComponent(uid)}`;
    $("publicProfileBtn").href = publicUrl;
    $("publicProfileLink").href = publicUrl;
    $("statusBox").textContent = `Bejelentkezve: ${session.user.email || "felhasználó"}`;

    const { data: adData } = await supaClient
      .from("hirdetesek")
      .select("email,telefonszam,varos,weboldal")
      .eq("user_id", uid)
      .order("created_at", { ascending: false })
      .limit(1);

    const firstAd = adData && adData[0] ? adData[0] : null;

    let profile = null;
    try {
      const { data } = await supaClient
        .from("szakember_profiles")
        .select("display_name,city,phone,website,bio,avatar_url")
        .eq("user_id", uid)
        .maybeSingle();
      profile = data;
    } catch {}

    $("displayName").value = profile?.display_name || "";
    $("city").value = profile?.city || firstAd?.varos || "";
    $("phone").value = profile?.phone || firstAd?.telefonszam || "";
    $("website").value = profile?.website || firstAd?.weboldal || "";
    $("bio").value = profile?.bio || "";
    $("avatarUrl").value = profile?.avatar_url || "";
    setAvatar(profile?.avatar_url || "");
  }

  $("avatarUrl").addEventListener("input", (e) => setAvatar(e.target.value));

  $("btnReload").addEventListener("click", async () => {
    const reloadBtn = $("btnReload");
    const originalText = reloadBtn.textContent;
    reloadBtn.disabled = true;
    reloadBtn.textContent = "Újratöltés...";
    try {
      setSaveState("idle");
  await loadProfile();
      showAlert("Profil újratöltve.", "ok");
      setSaveState("idle");
    } finally {
      reloadBtn.disabled = false;
      reloadBtn.textContent = originalText;
    }
  });

  $("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      setSaveState("saving");
      const { data: { session } } = await supaClient.auth.getSession();
      if (!session?.user) throw new Error("A mentéshez be kell jelentkezni.");

      const payload = {
        user_id: session.user.id,
        display_name: $("displayName").value.trim(),
        city: $("city").value.trim(),
        phone: $("phone").value.trim(),
        website: $("website").value.trim(),
        bio: $("bio").value.trim(),
        avatar_url: $("avatarUrl").value.trim(),
      };

      const { error } = await supaClient.from("szakember_profiles").upsert(payload);
      if (error) throw error;

      setAvatar(payload.avatar_url);
      showAlert("Profil mentve.", "ok");
      setSaveState("success", "✅ Profil sikeresen mentve");
    } catch (err) {
      console.error(err);
      const msg = err?.message || "Nem sikerült menteni a profilt. Futtasd le a supabase/schema_extra.sql fájlt is.";
      showAlert(msg, "error");
      setSaveState("error", `❌ ${msg}`);
    }
  });

  setSaveState("idle");
  await loadProfile();
</script>
</body>
</html>
