
[functions.generate-ad]
enabled = true
verify_jwt = true
import_map = "./functions/generate-ad/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/generate-ad/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/generate-ad/*.html" ]

# SzakiPiac -> Építési Napló átküldő function
# A felhasználó SzakiPiac bejelentkezését ellenőrzi, ezért verify_jwt = true.
[functions.send-quote-to-epitesnaplo]
enabled = true
verify_jwt = true
entrypoint = "./functions/send-quote-to-epitesnaplo/index.ts"

[functions.munkafigyelo-push]
enabled = true
verify_jwt = true
entrypoint = "./functions/munkafigyelo-push/index.ts"
