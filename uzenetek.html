<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üzenetek – SzakiPiac</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f3f4f6;
margin:0;
}

header{
background:#ffffff;
padding:14px 18px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
font-weight:bold;
font-size:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#ffffff;
padding:18px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#111827;
color:white;
cursor:pointer;
}

button:hover{
background:#374151;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
min-width:250px;
}

.message{
border-bottom:1px solid #eee;
padding:10px 0;
}
</style>

</head>

<body>

<header>
🔧 SzakiPiac
</header>

<div class="container">

<div class="card">

<h2>💬 Üzenetek</h2>

<div id="loginBox">
<input id="email" placeholder="Email cím">
<button onclick="login()">Bejelentkezés (email link)</button>
</div>

<div id="messages"></div>

</div>


<div class="card">

<h3>Szakember</h3>

<a id="profileLink">
<button>Profil megnyitása</button>
</a>

<p style="font-size:13px;color:#777;margin-top:10px;">
Ha te vagy a szakember, jelentkezz be és itt látod az üzeneteket.
</p>

</div>

</div>


<script>

const SUPABASE_URL = "https://tzmcofiuqeanftviquwp.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4dHBub3Rzd253cmJ5Y3ZmeXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI5MTQ0NDcsImV4cCI6MjA2ODQ5MDQ0N30.CXEfo_8qmIYhkEZFdTsbl9ZB-PRTP6UK8EbIxxpSGZc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");

if(uid){
document.getElementById("profileLink").href = "szakember.html?uid="+uid;
}


async function login(){

let email=document.getElementById("email").value;

const { error } = await supabaseClient.auth.signInWithOtp({

email: email,

options: {

emailRedirectTo: window.location.origin+"/uzenetek.html?uid="+uid

}

})

if(error){

alert("Belépési hiba: "+error.message)

}else{

alert("Email elküldve. Nyisd meg és kattints a linkre.")

}

}



async function loadMessages(){

const { data:{ session } } = await supabaseClient.auth.getSession();

if(!session){
return;
}

document.getElementById("loginBox").style.display="none";

const { data, error } = await supabaseClient

.from("szakember_messages")

.select("*")

.eq("to_user_id",session.user.id)

.order("created_at",{ascending:false});


if(error){

document.getElementById("messages").innerHTML="Hiba: "+error.message;

return;

}

let html="";

data.forEach(m=>{

html+=`
<div class="message">
<div><b>${m.from_email}</b></div>
<div>${m.message}</div>
<div style="font-size:12px;color:#888">${new Date(m.created_at).toLocaleString()}</div>
</div>
`

})

document.getElementById("messages").innerHTML=html;

}


loadMessages();

</script>

</body>
</html>
