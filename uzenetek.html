<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üzenetek – SzakiPiac</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
header{background:#fff;padding:14px 20px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.container{max-width:1100px;margin:auto;padding:20px;display:grid;grid-template-columns:2fr 1fr;gap:20px}
.card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
button{padding:10px 14px;border:none;border-radius:8px;background:#111827;color:#fff;cursor:pointer}
button:hover{background:#374151}
input{padding:10px;border:1px solid #ccc;border-radius:8px}
.message{border-bottom:1px solid #eee;padding:10px 0}
.small{font-size:13px;color:#666}
</style>

</head>
<body>

<header>
<b>🔧 SzakiPiac</b>
</header>

<div class="container">

<div class="card">

<h2>💬 Üzenetek</h2>

<div id="status" class="small"></div>

<div id="loginBox">

<input id="email" type="email" placeholder="Email cím">
<button id="loginBtn">Bejelentkezés (email link)</button>

<p class="small">
A belépéshez emailben kapsz egy linket.
</p>

</div>

<div id="messages" style="margin-top:20px"></div>

</div>

<div class="card">

<h3>Szakember</h3>

<a href="szakember.html">
<button>Profil megnyitása</button>
</a>

<p class="small">
Ha te vagy a szakember jelentkezz be és itt látod az üzeneteket.
</p>

</div>

</div>

<script>

const SUPABASE_URL = "https://bxtpnotsnwrbycvfypz.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4dHBub3Rzd253cmJ5Y3ZmeXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI5MTQ0NDcsImV4cCI6MjA2ODQ5MDQ0N30.CXEfo_8qmIYhkEZFdTsbl9ZB-PRTP6UK8EbIxxpSGZc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const status = document.getElementById("status");
const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const messagesBox = document.getElementById("messages");

async function checkConnection(){

try{

const r = await fetch(SUPABASE_URL + "/auth/v1/health");

if(r.ok){
status.innerHTML="Supabase kapcsolat: OK";
}
else{
status.innerHTML="Supabase hiba: "+r.status;
}

}catch(e){

status.innerHTML="Supabase kapcsolat: NEM ELÉRHETŐ";

}

}

checkConnection();


loginBtn.onclick = async ()=>{

const email = emailInput.value.trim();

if(!email){
alert("Írd be az email címet");
return;
}

const { error } = await supabaseClient.auth.signInWithOtp({
email: email,
options: {
emailRedirectTo: window.location.href
}
});

if(error){
alert(error.message);
}
else{
alert("Belépési link elküldve emailben");
}

};



async function loadMessages(){

const { data: { session } } = await supabaseClient.auth.getSession();

if(!session) return;

const user = session.user;

const { data, error } = await supabaseClient
.from("szakember_messages")
.select("*")
.eq("to_user_id", user.id)
.order("created_at", { ascending:false });

if(error){
messagesBox.innerHTML="Hiba: "+error.message;
return;
}

if(!data.length){
messagesBox.innerHTML="Nincs üzenet";
return;
}

messagesBox.innerHTML="";

data.forEach(m=>{

const div=document.createElement("div");

div.className="message";

div.innerHTML=`
<b>${m.from_name || m.from_email}</b>
<br>
${m.message}
<br>
<span class="small">${new Date(m.created_at).toLocaleString()}</span>
`;

messagesBox.appendChild(div);

});

}

supabaseClient.auth.onAuthStateChange((event, session)=>{

if(session){
loadMessages();
}

});

loadMessages();

</script>

</body>
</html>
