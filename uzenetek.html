<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Üzenetek – SzakiPiac</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f6;
margin:0;
}

header{
background:white;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:flex;
align-items:center;
gap:10px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.message{
border-bottom:1px solid #eee;
padding:10px 0;
}

.message:last-child{
border-bottom:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#111827;
color:white;
cursor:pointer;
}

button:hover{
background:#374151;
}

.small{
font-size:13px;
color:#666;
}

</style>

</head>

<body>

<header>
<div class="logo">🔧 SzakiPiac</div>
</header>

<div class="container">

<div class="card">

<h2>💬 Üzenetek</h2>

<div id="loginInfo">
A bejövő üzenetekhez be kell jelentkezni.
</div>

<div id="messageList"></div>

</div>


<div class="card">

<h3>Szakember</h3>

<a id="profileBtn" href="#">
<button>👤 Profil megnyitása</button>
</a>

</div>

</div>


<script>

const SUPABASE_URL = "https://tzmcofiuqeanftviquwp.supabase.co";

const SUPABASE_KEY = "sb_publishable_Mb8TFdTfXZqemImigup9Ig_RpJhUrx8";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let booted = false;

const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");

document.getElementById("profileBtn").href = "szakember.html?uid=" + uid;


async function boot(){

if(booted) return;
booted = true;

const { data:{ session } } = await supabaseClient.auth.getSession();

render(session);

supabaseClient.auth.onAuthStateChange((_event, session)=>{
render(session);
});

}



async function render(session){

const list = document.getElementById("messageList");
const loginInfo = document.getElementById("loginInfo");

list.innerHTML = "";

if(!session){

loginInfo.innerHTML = "Jelentkezz be, hogy lásd az üzeneteket.";

return;

}

loginInfo.innerHTML = "Bejelentkezve: " + session.user.email;


const { data, error } = await supabaseClient
.from("szakember_messages")
.select("*")
.eq("to_user_id", session.user.id)
.order("created_at",{ascending:false});


if(error){

list.innerHTML = "Hiba történt.";

return;

}


if(!data || data.length === 0){

list.innerHTML = "<p>Nincs üzenet.</p>";

return;

}


data.forEach(msg=>{

const div = document.createElement("div");

div.className = "message";

div.innerHTML = `
<div class="small">${new Date(msg.created_at).toLocaleString()}</div>
<div>${msg.message}</div>
<div class="small">Email: ${msg.from_email || "-"}</div>
`;

list.appendChild(div);

});

}


boot();

</script>

</body>
</html>
